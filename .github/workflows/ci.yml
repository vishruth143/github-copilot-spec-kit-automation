name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: DEV
        type: choice
        options: [DEV, TEST, STAGE, PROD]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    env:
      # ENV drives which per-environment secret suffix (DEV/TEST/STAGE/PROD)
      # is resolved below; defaults to DEV for push/pull_request triggers,
      # where workflow_dispatch inputs are unavailable.
      ENV: ${{ github.event.inputs.environment || 'DEV' }}
      INTERNET_HEROKUAPP_USERNAME: ${{ secrets.INTERNET_HEROKUAPP_USERNAME }}
      INTERNET_HEROKUAPP_PASSWORD: ${{ secrets.INTERNET_HEROKUAPP_PASSWORD }}
      # Dynamic secret lookups: the suffix (__DEV, __TEST, ...) is chosen at
      # expression-evaluation time from the selected environment, instead of
      # being hardcoded to __DEV.
      RESOLVED_INTERNET_HEROKUAPP_URL: ${{ secrets[format('INTERNET_HEROKUAPP_URL__{0}', github.event.inputs.environment || 'DEV')] }}
      RESOLVED_DEMO_PLAYWRIGHT_BASE_URL: ${{ secrets[format('DEMO_PLAYWRIGHT_BASE_URL__{0}', github.event.inputs.environment || 'DEV')] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export environment-specific base URL variables
        # GitHub Actions env: keys must be static, so the __<ENV> suffixed
        # variable names the app code expects (e.g. INTERNET_HEROKUAPP_URL__STAGE)
        # are constructed dynamically here from $ENV, rather than a fixed
        # __DEV key in the env: block above.
        shell: bash
        run: |
          echo "INTERNET_HEROKUAPP_URL__${ENV}=${RESOLVED_INTERNET_HEROKUAPP_URL}" >> "$GITHUB_ENV"
          echo "DEMO_PLAYWRIGHT_BASE_URL__${ENV}=${RESOLVED_DEMO_PLAYWRIGHT_BASE_URL}" >> "$GITHUB_ENV"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps ${{ matrix.browser }}

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Ruff)
        run: uv run ruff format --check .

      - name: Run tests in parallel
        run: uv run pytest -n auto --browser=${{ matrix.browser }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.browser }}
          path: output/
          if-no-files-found: ignore
          retention-days: 14
