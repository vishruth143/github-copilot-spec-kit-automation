name: CI

on:
  pull_request:

  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: TEST
        type: choice
        options:
          - DEV
          - TEST
          - STAGE
          - PROD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'TEST' }}

      BROWSER: ${{ matrix.browser }}
      HEADLESS: "true"

      INTERNET_HEROKUAPP_URL__DEV: ${{ secrets.INTERNET_HEROKUAPP_URL__DEV }}
      INTERNET_HEROKUAPP_URL__TEST: ${{ secrets.INTERNET_HEROKUAPP_URL__TEST }}
      INTERNET_HEROKUAPP_URL__STAGE: ${{ secrets.INTERNET_HEROKUAPP_URL__STAGE }}
      INTERNET_HEROKUAPP_URL__PROD: ${{ secrets.INTERNET_HEROKUAPP_URL__PROD }}

      DEMO_PLAYWRIGHT_BASE_URL__DEV: ${{ secrets.DEMO_PLAYWRIGHT_BASE_URL__DEV }}
      DEMO_PLAYWRIGHT_BASE_URL__TEST: ${{ secrets.DEMO_PLAYWRIGHT_BASE_URL__TEST }}
      DEMO_PLAYWRIGHT_BASE_URL__STAGE: ${{ secrets.DEMO_PLAYWRIGHT_BASE_URL__STAGE }}
      DEMO_PLAYWRIGHT_BASE_URL__PROD: ${{ secrets.DEMO_PLAYWRIGHT_BASE_URL__PROD }}

      INTERNET_HEROKUAPP_USERNAME: ${{ secrets.INTERNET_HEROKUAPP_USERNAME }}
      INTERNET_HEROKUAPP_PASSWORD: ${{ secrets.INTERNET_HEROKUAPP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps ${{ matrix.browser }}

      - name: Verify configuration
        shell: bash
        run: |
          echo "======================================"
          echo "Environment : $ENV"
          echo "Browser     : $BROWSER"
          echo "Headless    : $HEADLESS"
          echo "======================================"

          test -n "$INTERNET_HEROKUAPP_URL__DEV"
          test -n "$INTERNET_HEROKUAPP_URL__TEST"
          test -n "$INTERNET_HEROKUAPP_URL__STAGE"
          test -n "$INTERNET_HEROKUAPP_URL__PROD"

          test -n "$DEMO_PLAYWRIGHT_BASE_URL__DEV"
          test -n "$DEMO_PLAYWRIGHT_BASE_URL__TEST"
          test -n "$DEMO_PLAYWRIGHT_BASE_URL__STAGE"
          test -n "$DEMO_PLAYWRIGHT_BASE_URL__PROD"

          test -n "$INTERNET_HEROKUAPP_USERNAME"
          test -n "$INTERNET_HEROKUAPP_PASSWORD"

          echo "✅ Configuration validated."

      - name: Run Ruff Lint
        run: uv run ruff check .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Execute Playwright Tests
        run: |
          uv run pytest \
            -n auto \
            --browser=${{ matrix.browser }}

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ env.ENV }}-${{ matrix.browser }}
          path: output/
          if-no-files-found: ignore
          retention-days: 14
